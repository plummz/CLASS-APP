<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="HTML CSS JavaScript coding workspace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#0f172a"/>
      <stop offset=".55" stop-color="#13294b"/>
      <stop offset="1" stop-color="#0e7490"/>
    </linearGradient>
    <linearGradient id="pane" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#020617"/>
    </linearGradient>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="10" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <circle cx="990" cy="110" r="180" fill="#22d3ee" opacity=".18"/>
  <circle cx="140" cy="650" r="220" fill="#a7f3d0" opacity=".12"/>
  <g transform="translate(110 110)">
    <rect width="980" height="540" rx="34" fill="url(#pane)" opacity=".94" stroke="#67e8f9" stroke-opacity=".32"/>
    <rect x="0" y="0" width="980" height="58" rx="34" fill="#0b1120"/>
    <circle cx="40" cy="30" r="8" fill="#ef4444"/>
    <circle cx="68" cy="30" r="8" fill="#f59e0b"/>
    <circle cx="96" cy="30" r="8" fill="#22c55e"/>
    <rect x="150" y="20" width="280" height="18" rx="9" fill="#1e293b"/>
    <g font-family="Consolas, monospace" font-size="28" font-weight="700">
      <text x="70" y="132" fill="#fb923c">&lt;section</text>
      <text x="210" y="132" fill="#67e8f9">class</text>
      <text x="300" y="132" fill="#e5e7eb">=</text>
      <text x="328" y="132" fill="#a7f3d0">"hero"</text>
      <text x="438" y="132" fill="#fb923c">&gt;</text>
      <text x="110" y="190" fill="#facc15">&lt;h1&gt;</text>
      <text x="220" y="190" fill="#e5e7eb">Build. Run. Debug.</text>
      <text x="520" y="190" fill="#facc15">&lt;/h1&gt;</text>
      <text x="110" y="248" fill="#38bdf8">button</text>
      <text x="222" y="248" fill="#e5e7eb">.</text>
      <text x="242" y="248" fill="#a7f3d0">addEventListener</text>
      <text x="470" y="248" fill="#e5e7eb">(</text>
      <text x="490" y="248" fill="#f472b6">'click'</text>
      <text x="610" y="248" fill="#e5e7eb">, run)</text>
      <text x="110" y="306" fill="#c084fc">.preview</text>
      <text x="250" y="306" fill="#e5e7eb">{ display: grid; }</text>
    </g>
    <g transform="translate(650 130)" filter="url(#glow)">
      <rect width="230" height="170" rx="24" fill="#ecfeff" opacity=".95"/>
      <rect x="28" y="34" width="174" height="20" rx="10" fill="#0891b2"/>
      <rect x="28" y="76" width="132" height="16" rx="8" fill="#0f172a" opacity=".55"/>
      <rect x="28" y="112" width="88" height="34" rx="17" fill="#22c55e"/>
    </g>
  </g>
</svg>
