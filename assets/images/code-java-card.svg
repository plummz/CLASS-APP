<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="760" viewBox="0 0 1200 760" role="img" aria-label="Java Swing coding workspace">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#160f2b"/>
      <stop offset=".55" stop-color="#3b1625"/>
      <stop offset="1" stop-color="#7f1d1d"/>
    </linearGradient>
    <linearGradient id="panel" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#111827"/>
      <stop offset="1" stop-color="#1f2937"/>
    </linearGradient>
    <filter id="soft" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="20" stdDeviation="18" flood-color="#000" flood-opacity=".35"/>
    </filter>
  </defs>
  <rect width="1200" height="760" fill="url(#bg)"/>
  <circle cx="1020" cy="150" r="210" fill="#f97316" opacity=".16"/>
  <circle cx="160" cy="620" r="240" fill="#facc15" opacity=".1"/>
  <g transform="translate(120 95)" filter="url(#soft)">
    <rect width="960" height="570" rx="34" fill="url(#panel)" stroke="#fca5a5" stroke-opacity=".3"/>
    <rect x="44" y="54" width="420" height="462" rx="22" fill="#020617" stroke="#f97316" stroke-opacity=".24"/>
    <g font-family="Consolas, monospace" font-size="24" font-weight="700">
      <text x="82" y="120" fill="#fca5a5">import</text>
      <text x="174" y="120" fill="#e5e7eb">javax.swing.*;</text>
      <text x="82" y="184" fill="#93c5fd">public class</text>
      <text x="252" y="184" fill="#fef3c7">Main</text>
      <text x="82" y="246" fill="#fca5a5">JFrame</text>
      <text x="184" y="246" fill="#e5e7eb">frame = new JFrame();</text>
      <text x="82" y="308" fill="#fca5a5">JButton</text>
      <text x="194" y="308" fill="#e5e7eb">run = new JButton();</text>
      <text x="82" y="370" fill="#86efac">System.out</text>
      <text x="236" y="370" fill="#e5e7eb">.println("OK");</text>
    </g>
    <g transform="translate(555 118)">
      <rect width="310" height="240" rx="18" fill="#f8fafc"/>
      <rect width="310" height="44" rx="18" fill="#e5e7eb"/>
      <circle cx="24" cy="22" r="6" fill="#ef4444"/>
      <circle cx="46" cy="22" r="6" fill="#f59e0b"/>
      <circle cx="68" cy="22" r="6" fill="#22c55e"/>
      <rect x="42" y="82" width="226" height="30" rx="15" fill="#cbd5e1"/>
      <rect x="74" y="138" width="162" height="48" rx="18" fill="#f97316"/>
      <text x="155" y="169" text-anchor="middle" font-family="Arial, sans-serif" font-size="20" font-weight="800" fill="#fff">Swing UI</text>
    </g>
    <path d="M845 475c-90 35-210 31-300-6 95 82 223 84 300 6z" fill="#f97316" opacity=".7"/>
  </g>
</svg>
